{% extends "base.html" %}

{% block title %}Novo lote — ChipCut{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6">
        <h1 class="h3 mb-4">Novo lote</h1>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_nome">Nome do lote</label>
                        <input type="text" name="nome" id="id_nome" class="form-control"
                               value="{{ nome|default:'' }}" maxlength="100" autofocus required
                               placeholder="Ex.: Devolução loja Centro — 01/06">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Criar e iniciar leitura</button>
                        <a href="{% url 'lotes:list' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
