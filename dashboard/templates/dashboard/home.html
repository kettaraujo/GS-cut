{% extends "base.html" %}

{% block title %}Dashboard — ChipCut{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
    <h1 class="h3 mb-0"><i class="bi bi-speedometer2 text-primary"></i> Dashboard</h1>
    <a href="{% url 'lotes:create' %}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Novo lote</a>
</div>

<!-- Filtro de data (SPEC002) — re-renderiza o painel via HTMX -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form class="row g-2 align-items-end" hx-get="{% url 'dashboard:home' %}"
              hx-target="#painel" hx-swap="innerHTML" hx-indicator="#loading-indicator">
            <div class="col-auto">
                <label class="form-label small text-muted mb-1">De</label>
                <input type="date" name="data_inicio" value="{{ data_inicio|date:'Y-m-d' }}"
                       class="form-control form-control-sm">
            </div>
            <div class="col-auto">
                <label class="form-label small text-muted mb-1">Até</label>
                <input type="date" name="data_fim" value="{{ data_fim|date:'Y-m-d' }}"
                       class="form-control form-control-sm">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-sm btn-outline-primary"><i class="bi bi-funnel"></i> Filtrar</button>
            </div>
            <div class="col-auto ms-auto btn-group btn-group-sm" role="group">
                <button type="button" class="btn btn-outline-secondary"
                        hx-get="{% url 'dashboard:home' %}?data_inicio={{ presets.hoje.di|date:'Y-m-d' }}&data_fim={{ presets.hoje.df|date:'Y-m-d' }}"
                        hx-target="#painel" hx-indicator="#loading-indicator">Hoje</button>
                <button type="button" class="btn btn-outline-secondary"
                        hx-get="{% url 'dashboard:home' %}?data_inicio={{ presets.semana.di|date:'Y-m-d' }}&data_fim={{ presets.semana.df|date:'Y-m-d' }}"
                        hx-target="#painel" hx-indicator="#loading-indicator">Últimos 7 dias</button>
                <button type="button" class="btn btn-outline-secondary"
                        hx-get="{% url 'dashboard:home' %}?data_inicio={{ presets.mes.di|date:'Y-m-d' }}&data_fim={{ presets.mes.df|date:'Y-m-d' }}"
                        hx-target="#painel" hx-indicator="#loading-indicator">Este mês</button>
            </div>
        </form>
    </div>
</div>

<div id="painel">
    {% include "dashboard/_painel.html" %}
</div>
{% endblock %}
