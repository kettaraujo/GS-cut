{% extends "base.html" %}
{% load static %}

{% block title %}Entrar — ChipCut{% endblock %}

{% block content %}
<div class="cc-login">
  <div class="cc-login-card">
    <div class="cc-login-accent"></div>
    <div class="card-body p-4 p-sm-5">

      <div class="text-center mb-4">
        <img src="{% static 'img/logo-goldensat.png' %}" alt="Grupo GoldenSat" class="cc-login-logo">
        <h1 class="h3 mt-3 mb-0 cc-login-title">ChipCut</h1>
        <div class="cc-login-sub">GRUPO GOLDENSAT</div>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger py-2">Usuário ou senha inválidos.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" for="id_username">Usuário</label>
          <input type="text" name="username" id="id_username"
                 class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label" for="id_password">Senha</label>
          <input type="password" name="password" id="id_password"
                 class="form-control" required>
        </div>
        <button type="submit" class="btn cc-btn-navy w-100">Entrar</button>
        <input type="hidden" name="next" value="{{ next }}">
      </form>

      <div class="cc-palette" title="Paleta GoldenSat">
        <span class="cc-swatch" style="background:#efc319" title="Dourado"></span>
        <span class="cc-swatch" style="background:#1a2332" title="Azul-marinho"></span>
        <span class="cc-swatch" style="background:#d4a574" title="Âmbar"></span>
        <span class="cc-swatch" style="background:#0d6efd" title="Primário"></span>
        <span class="cc-swatch" style="background:#198754" title="Sucesso"></span>
      </div>

    </div>
  </div>
  <p class="cc-login-foot">Grupo GoldenSat · uso interno</p>
</div>
{% endblock %}
