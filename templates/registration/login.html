{% extends "base.html" %}

{% block title %}Entrar — ChipCut{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-sm-8 col-md-5 col-lg-4">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h1 class="h4 text-center mb-4">✂️ ChipCut</h1>

                {% if form.errors %}
                    <div class="alert alert-danger">Usuário ou senha inválidos.</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="id_username">Usuário</label>
                        <input type="text" name="username" id="id_username"
                               class="form-control" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="id_password">Senha</label>
                        <input type="password" name="password" id="id_password"
                               class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
