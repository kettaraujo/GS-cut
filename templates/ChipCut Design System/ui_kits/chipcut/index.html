<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ChipCut — UI Kit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../../colors_and_type.css" rel="stylesheet">

  <style>
    /* ---- Shell (recreates base.html .chipcut-shell + app.css) ---- */
    html, body { height: 100%; }
    body { background: var(--cc-bg); }
    #root { min-height: 100%; }
    .cc-shell { display: flex; min-height: 100vh; }

    .cc-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--gs-navy);
      color: var(--gs-amber);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .cc-sidebar-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .cc-brand {
      color: var(--gs-amber);
      font-weight: 700;
      font-size: 1.25rem;
      text-decoration: none;
    }
    .cc-nav .nav-link {
      color: var(--cc-sidebar-link);
      padding: .7rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      border-left: 3px solid transparent;
    }
    .cc-nav .nav-link:hover { background: rgba(255,255,255,.06); color: #fff; }
    .cc-nav .nav-link.active {
      background: var(--gs-amber-soft);
      color: var(--gs-amber);
      border-left-color: var(--gs-amber);
    }
    .cc-nav .nav-link.disabled { color: var(--cc-sidebar-disabled); pointer-events: none; }
    .cc-sidebar-footer {
      color: var(--cc-sidebar-link);
      border-top: 1px solid rgba(255,255,255,.08);
      padding: 1rem;
    }

    .cc-content { min-width: 0; flex-grow: 1; }

    /* Mobile: sidebar becomes a slide-in offcanvas */
    .cc-backdrop { display: none; }
    @media (max-width: 991.98px) {
      .cc-sidebar {
        position: fixed;
        z-index: 1045;
        transform: translateX(-100%);
        transition: transform .3s ease;
      }
      .cc-sidebar.open { transform: translateX(0); }
      .cc-backdrop.show {
        display: block;
        position: fixed; inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 1040;
      }
    }
    @media (min-width: 992px) {
      .navbar.d-lg-none { display: none !important; }
    }

    /* ---- App-specific bits from static/css/app.css ---- */
    .kpi-card .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .kpi-card .kpi-icon { font-size: 1.6rem; opacity: .9; }
    .cursor-pointer { cursor: pointer; }
    .chip-thumb { object-fit: cover; border-radius: 6px; border: 1px solid var(--cc-gray-300); }
    .capture-preview {
      width: 100%; max-width: 420px; margin: 0 auto;
      border-radius: 10px; border: 2px dashed var(--cc-gray-500);
      background: #fff; aspect-ratio: 4 / 3; object-fit: contain;
    }
    .btn-capture { font-size: 1.1rem; padding: .85rem 1rem; }

    /* image lightbox */
    .cc-modal {
      position: fixed; inset: 0; z-index: 1100;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; cursor: zoom-out;
    }
    .cc-modal img { max-width: 92vw; max-height: 88vh; border-radius: 8px; box-shadow: var(--shadow-lg); }

    /* ---- Branded login ---- */
    .cc-login {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(120% 90% at 50% -10%, rgba(239,195,25,.10), transparent 55%),
        linear-gradient(160deg, var(--gs-navy) 0%, var(--gs-navy-700) 100%);
    }
    .cc-login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .cc-login-accent {
      height: 4px;
      background: linear-gradient(90deg, var(--gs-gold) 0%, var(--gs-gold-700) 100%);
    }
    .cc-btn-navy {
      background: var(--gs-navy);
      color: #fff;
      font-weight: 600;
      border: 1px solid var(--gs-navy);
    }
    .cc-btn-navy:hover { background: var(--gs-navy-700); color: var(--gs-gold); }
    .cc-palette {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--cc-gray-200);
    }
    .cc-swatch {
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,.08);
    }
    .cc-login-foot {
      color: rgba(255,255,255,.6);
      font-size: .8rem;
      margin: 1.25rem 0 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="badges.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="login.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="lotes.jsx"></script>
  <script type="text/babel" src="review.jsx"></script>
  <script type="text/babel" src="capture.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
