<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family:"Inter",system-ui,sans-serif; }
  .lock { display:inline-flex; align-items:center; gap:.7rem; }
  .lock img { height:48px; width:auto; }
  .wm { font-weight:700; letter-spacing:-0.01em; line-height:1; font-size:26px; }
  .sub { font-size:11px; font-weight:600; letter-spacing:.05em; margin-top:2px; }
  .on-navy { background:#1a2332; padding:20px 28px; }
  .on-light { background:#fff; padding:20px 28px; }
  .row { display:flex; }
</style>
</head>
<body>
  <div class="row">
    <div class="on-navy">
      <div class="lock">
        <img src="logo-goldensat.png" alt="GoldenSat">
        <div>
          <div class="wm" style="color:#fff;">ChipCut</div>
          <div class="sub" style="color:#efc319;">GRUPO GOLDENSAT</div>
        </div>
      </div>
    </div>
    <div class="on-light">
      <div class="lock">
        <img src="logo-goldensat.png" alt="GoldenSat">
        <div>
          <div class="wm" style="color:#1a2332;">ChipCut</div>
          <div class="sub" style="color:#c79e0f;">GRUPO GOLDENSAT</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
