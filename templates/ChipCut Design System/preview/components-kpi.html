<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:22px;background:#f8f9fa;}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;font-weight:600;}
  .row{display:flex;gap:16px;}
  .row > div{flex:1;}
</style></head>
<body>
  <div class="lbl">KPI cards · dashboard</div>
  <div class="row">
    <div class="card shadow-sm kpi-card"><div class="card-body d-flex align-items-center gap-3">
      <i class="bi bi-card-checklist kpi-icon text-primary" style="font-size:1.6rem;"></i>
      <div><div class="kpi-value">1.247</div><div class="text-muted small">Chips lidos</div></div>
    </div></div>
    <div class="card shadow-sm kpi-card"><div class="card-body d-flex align-items-center gap-3">
      <i class="bi bi-clock-history kpi-icon text-warning" style="font-size:1.6rem;"></i>
      <div><div class="kpi-value">38</div><div class="text-muted small">Em revisão</div></div>
    </div></div>
    <div class="card shadow-sm kpi-card"><div class="card-body d-flex align-items-center gap-3">
      <i class="bi bi-exclamation-triangle kpi-icon text-danger" style="font-size:1.6rem;"></i>
      <div><div class="kpi-value">12</div><div class="text-muted small">Erros de leitura</div></div>
    </div></div>
  </div>
</body></html>
