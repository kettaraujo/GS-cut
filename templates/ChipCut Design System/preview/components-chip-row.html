<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:18px;background:#fff;}
  .chip-thumb{width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid #dee2e6;}
  th{font-size:12px;color:var(--fg2);font-weight:600;}
  td{vertical-align:middle;}
</style></head>
<body>
  <table class="table table-hover table-sm align-middle mb-0">
    <thead><tr><th>#</th><th>Imagem</th><th>ICCID</th><th class="text-center">Tent.</th><th>Revisão</th><th></th></tr></thead>
    <tbody>
      <tr>
        <td>1</td>
        <td><img class="chip-thumb" src="../assets/sample-chips/chip-1.jpg" alt="chip"></td>
        <td><span class="iccid">8955 0102 0000 1234 567</span></td>
        <td class="text-center"><span class="badge text-bg-success">1ª</span></td>
        <td><span class="badge text-bg-warning"><i class="bi bi-clock-history"></i> Aguardando</span></td>
        <td class="text-end"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></td>
      </tr>
      <tr>
        <td>2</td>
        <td><img class="chip-thumb" src="../assets/sample-chips/chip-2.jpg" alt="chip"></td>
        <td><span class="iccid">8955 0102 0000 7654 321</span></td>
        <td class="text-center"><span class="badge text-bg-warning">2ª</span></td>
        <td><span class="badge text-bg-success"><i class="bi bi-check-circle"></i> Aprovado</span></td>
        <td class="text-end"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button></td>
      </tr>
    </tbody>
  </table>
</body></html>
