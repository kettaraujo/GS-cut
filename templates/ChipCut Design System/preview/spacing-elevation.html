<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:28px;background:#f8f9fa;font-family:var(--font-sans);color:var(--fg1);}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:20px;font-weight:600;}
  .row{display:flex;gap:28px;}
  .it{text-align:center;}
  .box{width:120px;height:62px;background:#fff;border-radius:8px;}
  .nm{font-weight:600;font-size:12px;margin-top:12px;}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg2);}
</style></head>
<body>
  <div class="lbl">Elevation — essentially one level</div>
  <div class="row">
    <div class="it"><div class="box" style="border:1px solid #dee2e6;"></div><div class="nm">flat</div><div class="px">1px border</div></div>
    <div class="it"><div class="box" style="box-shadow:0 .125rem .25rem rgba(0,0,0,.075);"></div><div class="nm">shadow-sm</div><div class="px">every card</div></div>
    <div class="it"><div class="box" style="box-shadow:0 .5rem 1rem rgba(0,0,0,.15);"></div><div class="nm">shadow</div><div class="px">modals</div></div>
  </div>
</body></html>
