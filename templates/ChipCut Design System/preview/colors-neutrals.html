<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .swatches{display:flex;gap:8px;}
  .sw{flex:1;}
  .chip{height:56px;border-radius:6px;border:1px solid rgba(0,0,0,.06);}
  .nm{font-weight:600;font-size:11px;margin-top:6px;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg2);}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600;}
</style></head>
<body>
  <div class="lbl">Neutrals · canvas, borders, text</div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#f8f9fa;"></div><div class="nm">BG / 100</div><div class="hex">#F8F9FA</div></div>
    <div class="sw"><div class="chip" style="background:#e9ecef;"></div><div class="nm">200</div><div class="hex">#E9ECEF</div></div>
    <div class="sw"><div class="chip" style="background:#dee2e6;"></div><div class="nm">300 · border</div><div class="hex">#DEE2E6</div></div>
    <div class="sw"><div class="chip" style="background:#adb5bd;"></div><div class="nm">500</div><div class="hex">#ADB5BD</div></div>
    <div class="sw"><div class="chip" style="background:#6c757d;"></div><div class="nm">600 · muted</div><div class="hex">#6C757D</div></div>
    <div class="sw"><div class="chip" style="background:#343a40;"></div><div class="nm">800 · dark</div><div class="hex">#343A40</div></div>
    <div class="sw"><div class="chip" style="background:#212529;"></div><div class="nm">900 · text</div><div class="hex">#212529</div></div>
  </div>
</body></html>
