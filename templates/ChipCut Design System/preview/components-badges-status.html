<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:22px;background:#fff;}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px;font-weight:600;}
  .grp{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;}
  .badge i{margin-right:.25rem;}
</style></head>
<body>
  <div class="lbl">Revisão</div>
  <div class="grp">
    <span class="badge text-bg-warning"><i class="bi bi-clock-history"></i>Aguardando Aprovação</span>
    <span class="badge text-bg-success"><i class="bi bi-check-circle"></i>Aprovado</span>
    <span class="badge text-bg-danger"><i class="bi bi-x-circle"></i>Rejeitado</span>
  </div>
  <div class="lbl">Leitura · tentativa</div>
  <div class="grp" style="margin-bottom:0;">
    <span class="badge text-bg-success"><i class="bi bi-check2"></i>Lido</span>
    <span class="badge text-bg-danger"><i class="bi bi-exclamation-triangle"></i>Erro de Leitura</span>
    <span class="badge text-bg-secondary"><i class="bi bi-hourglass"></i>Pendente</span>
    <span class="badge text-bg-success">1ª</span>
    <span class="badge text-bg-warning">2ª</span>
    <span class="badge text-bg-info">corrigido</span>
  </div>
</body></html>
