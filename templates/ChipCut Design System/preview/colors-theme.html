<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .swatches{display:flex;gap:12px;}
  .sw{flex:1;}
  .chip{height:64px;border-radius:8px;}
  .nm{font-weight:600;font-size:12px;margin-top:7px;}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg2);}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600;}
</style></head>
<body>
  <div class="lbl">Theme · Bootstrap 5.3 (semantic)</div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#0d6efd;"></div><div class="nm">Primary</div><div class="hex">#0D6EFD</div></div>
    <div class="sw"><div class="chip" style="background:#198754;"></div><div class="nm">Success</div><div class="hex">#198754</div></div>
    <div class="sw"><div class="chip" style="background:#ffc107;"></div><div class="nm">Warning</div><div class="hex">#FFC107</div></div>
    <div class="sw"><div class="chip" style="background:#dc3545;"></div><div class="nm">Danger</div><div class="hex">#DC3545</div></div>
    <div class="sw"><div class="chip" style="background:#0dcaf0;"></div><div class="nm">Info</div><div class="hex">#0DCAF0</div></div>
    <div class="sw"><div class="chip" style="background:#6c757d;"></div><div class="nm">Secondary</div><div class="hex">#6C757D</div></div>
  </div>
</body></html>
