<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:var(--fg1);}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;font-weight:600;}
  .big{font-family:var(--font-mono);letter-spacing:.5px;font-size:26px;color:#212529;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg2);margin-top:14px;}
  .copy{display:inline-block;margin-top:14px;font-family:var(--font-mono);font-size:13px;letter-spacing:.5px;background:#f8f9fa;border:1px solid #dee2e6;border-radius:6px;padding:6px 10px;}
</style></head>
<body>
  <div class="lbl">ICCID · monospace numerals</div>
  <div class="big">8955 0102 0000 1234 567</div>
  <div class="copy">.iccid → ui-monospace · letter-spacing .5px</div>
  <div class="meta">The only place type leaves Inter. Click-to-copy in tables; editable inline during review.</div>
</body></html>
