<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:20px;background:#fff;}
  .swatches{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:74px;border-radius:8px;border:1px solid rgba(0,0,0,.08);}
  .nm{font-weight:600;font-size:13px;margin-top:8px;}
  .hex{font-family:var(--font-mono);font-size:12px;color:var(--fg2);}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600;}
</style></head>
<body>
  <div class="lbl">Brand · GoldenSat</div>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#efc319;"></div><div class="nm">Gold</div><div class="hex">#EFC319</div><div class="hex" style="color:#8a93a3">logo / brand</div></div>
    <div class="sw"><div class="chip" style="background:#1a2332;"></div><div class="nm">Navy</div><div class="hex">#1A2332</div><div class="hex" style="color:#8a93a3">sidebar bg</div></div>
    <div class="sw"><div class="chip" style="background:#d4a574;"></div><div class="nm">Amber</div><div class="hex">#D4A574</div><div class="hex" style="color:#8a93a3">nav text tint</div></div>
    <div class="sw"><div class="chip" style="background:#111111;"></div><div class="nm">Black</div><div class="hex">#111111</div><div class="hex" style="color:#8a93a3">logo detail</div></div>
  </div>
</body></html>
