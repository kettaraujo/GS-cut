<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="../colors_and_type.css" rel="stylesheet">
<style>
  body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
  .lbl{font-size:11px;color:var(--fg2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;font-weight:600;}
  .grid{display:flex;gap:14px;align-items:center;}
  .thumb{width:88px;height:88px;object-fit:cover;border-radius:6px;border:1px solid #dee2e6;}
  .note{font-size:12px;color:var(--fg2);max-width:220px;line-height:1.45;}
</style></head>
<body>
  <div class="lbl">Imagery · captured SIM photos</div>
  <div class="grid">
    <img class="thumb" src="../assets/sample-chips/chip-1.jpg" alt="chip">
    <img class="thumb" src="../assets/sample-chips/chip-2.jpg" alt="chip">
    <img class="thumb" src="../assets/sample-chips/chip-3.jpg" alt="chip">
    <div class="note">The only imagery in ChipCut: raw, neutral phone-camera SIM photos. Square thumbnails, object-fit cover, 6px radius, 1px grey border. No filters or grain.</div>
  </div>
</body></html>
